name: False-green case
description: Agent claimed work was done, but proof or reality did not match
labels:
  - alpha-feedback
  - false-green
  - ownership:needs-triage
body:
  - type: markdown
    attributes:
      value: Do not paste secrets, private source, absolute paths, or unredacted Synrail artifacts. Use SECURITY.md for suspected vulnerabilities.
  - type: input
    id: environment
    attributes:
      label: Synrail version / commit and OS
      placeholder: 0.1.3.dev0 / a01ed42, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: agent_used
    attributes:
      label: Agent used
      placeholder: Claude Code / Cursor / Codex / Aider / other
    validations:
      required: true
  - type: input
    id: task_type
    attributes:
      label: Task type
      placeholder: small refactor / test fix / docs change / batch edit
    validations:
      required: true
  - type: textarea
    id: invocation
    attributes:
      label: Exact Synrail command, redacted working directory, and artifact mode
      placeholder: synrail check --ephemeral; target repo root; ephemeral
    validations:
      required: true
  - type: textarea
    id: claim
    attributes:
      label: Agent claim
      placeholder: What did the agent say was done?
    validations:
      required: true
  - type: textarea
    id: reality
    attributes:
      label: What was actually wrong
      placeholder: tests did not run / wrong file changed / proof mismatch / incomplete task
    validations:
      required: true
  - type: dropdown
    id: caught
    attributes:
      label: Did Synrail catch it?
      options:
        - yes
        - no
        - partially
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: What should Synrail have blocked, accepted, or explained?
    validations:
      required: true
  - type: dropdown
    id: demo_result
    attributes:
      label: Did the standalone demo pass on the same install?
      options:
        - yes
        - no
        - not run
    validations:
      required: true
