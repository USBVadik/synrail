name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip
      - name: Install Synrail dev dependencies
        run: make install-dev
      - name: Run unit tests
        run: make test
      - name: Compile Python files
        run: make compile
      - name: Run Ruff
        run: make lint
      - name: Run coverage
        run: make coverage
      - name: Audit Python dependencies
        run: make audit
      - name: Check repository text for common secret patterns
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          patterns = [
              re.compile(r"BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY"),
              re.compile(r"ghp_[A-Za-z0-9]{20,}"),
              re.compile(r"github_pat_[A-Za-z0-9_]{20,}"),
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"AIza[A-Za-z0-9_-]{20,}"),
              re.compile(r"xox[baprs]-[A-Za-z0-9-]{10,}"),
          ]
          excluded_dirs = {".git", ".venv", "__pycache__"}
          excluded_suffixes = {".pyc"}

          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if any(part in excluded_dirs or part.startswith(".tmp-") for part in path.parts):
                  continue
              if path.suffix in excluded_suffixes:
                  continue
              try:
                  text = path.read_text(errors='ignore')
              except OSError:
                  continue
              for pattern in patterns:
                  if pattern.search(text):
                      print(f"Potential secret pattern detected: {path}")
                      sys.exit(1)
          PY
  windows-smoke:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add Git for Windows Unix tools
        shell: pwsh
        run: |
          "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Upgrade pip and build tooling
        shell: pwsh
        run: python -m pip install --upgrade pip setuptools
      - name: Install Synrail dev dependencies
        shell: pwsh
        run: python -m pip install -e ".[dev]" -c constraints-dev.txt
      - name: Compile Python files
        shell: pwsh
        run: |
          python -c "import pathlib, py_compile; [py_compile.compile(str(path), doraise=True) for path in [pathlib.Path('alpha.py'), *pathlib.Path('tools/reference').glob('*.py')]]"
      - name: Run Windows install and artifact smoke tests
        shell: pwsh
        run: python -m unittest tests.test_synrail_io tests.test_bootstrap_starter_text tests.test_install_smoke
      - name: Run targeted Ruff checks
        shell: pwsh
        run: python -m ruff check tools/reference/synrail_io_v0.py tools/reference/synrail_bootstrap_v0.py tools/reference/synrail_cli_v0.py tests/test_synrail_io.py tests/test_bootstrap_starter_text.py tests/test_install_smoke.py
      - name: Audit Python dependencies
        shell: pwsh
        run: python -m pip_audit
