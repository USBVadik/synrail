name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"
permissions:
  contents: read
jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip
      - name: Install Synrail dev dependencies
        run: make install-dev
      - name: Run unit tests
        run: make test
      - name: Compile Python files
        run: make compile
      - name: Run Ruff
        if: matrix.python-version == '3.11'
        run: make lint
      - name: Run coverage
        if: matrix.python-version == '3.11'
        run: make coverage
      - name: Audit Python dependencies
        if: matrix.python-version == '3.11'
        run: make audit
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full history for secret scanning
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Scan tracked history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
  windows-smoke:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Add Git for Windows Unix tools
        shell: pwsh
        run: |
          "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Upgrade pip and build tooling
        shell: pwsh
        run: python -m pip install --upgrade pip setuptools -c constraints-dev.txt
      - name: Install Synrail dev dependencies
        shell: pwsh
        run: python -m pip install -e ".[dev]" -c constraints-dev.txt
      - name: Compile Python files
        shell: pwsh
        run: |
          python -c "import pathlib, py_compile; [py_compile.compile(str(path), doraise=True) for path in [pathlib.Path('alpha.py'), *pathlib.Path('tools/reference').glob('*.py')]]"
      - name: Run Windows install and artifact smoke tests
        shell: pwsh
        run: python -m unittest tests.test_synrail_io tests.test_bootstrap_starter_text tests.test_install_smoke
      - name: Run targeted Ruff checks
        shell: pwsh
        run: python -m ruff check tools/reference/synrail_io_v0.py tools/reference/synrail_bootstrap_v0.py tools/reference/synrail_cli_v0.py tests/test_synrail_io.py tests/test_bootstrap_starter_text.py tests/test_install_smoke.py
      - name: Audit Python dependencies
        shell: pwsh
        run: python -m pip_audit
