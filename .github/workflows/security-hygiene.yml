name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip
      - name: Install Synrail dev dependencies
        run: make install-dev
      - name: Run unit tests
        run: make test
      - name: Compile Python files
        run: make compile
      - name: Run Ruff
        run: make lint
      - name: Run coverage
        run: make coverage
      - name: Audit Python dependencies
        run: make audit
      - name: Check repository text for common secret patterns
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          patterns = [
              re.compile(r"BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY"),
              re.compile(r"ghp_[A-Za-z0-9]{20,}"),
              re.compile(r"github_pat_[A-Za-z0-9_]{20,}"),
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"AIza[A-Za-z0-9_-]{20,}"),
              re.compile(r"xox[baprs]-[A-Za-z0-9-]{10,}"),
          ]
          excluded_dirs = {".git", ".venv", "__pycache__"}
          excluded_suffixes = {".pyc"}

          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if any(part in excluded_dirs or part.startswith(".tmp-") for part in path.parts):
                  continue
              if path.suffix in excluded_suffixes:
                  continue
              try:
                  text = path.read_text(errors='ignore')
              except OSError:
                  continue
              for pattern in patterns:
                  if pattern.search(text):
                      print(f"Potential secret pattern detected: {path}")
                      sys.exit(1)
          PY
